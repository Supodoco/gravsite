<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Предпросмотр гравировки</title>

  <!-- Подключаем стили шрифтов -->
  <link rel="stylesheet" href="fonts.css">

  <style>
    :root {
      --bg: #f0f4ff;
      --primary: #6b48ff;
      --teal: #2dd4bf;
      --coral: #ff6b6b;
      --mustard: #f4c430;
      --mint: #a7f3d0;
      --text: #1e293b;
      --gray: #64748b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    .container { max-width: 1180px; margin: 0 auto; }
    header {
      text-align: center;
      margin-bottom: 3rem;
    }
    header h1 {
      font-size: clamp(2.2rem, 6vw, 3.8rem);
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 0.5rem;
      letter-spacing: -1px;
    }
    header p {
      font-size: 1.2rem;
      color: var(--gray);
      max-width: 560px;
      margin: 0 auto 1.5rem;
    }
    .header-action {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 2.5rem;
      flex-wrap: wrap;
    }
    .avito-icon-wrapper {
      width: 48px;
      height: 48px;
      border: 2px solid var(--primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .avito-icon {
      width: 40px;
      height: 40px;
      object-fit: contain;
    }
    .order-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 48px;
      padding: 0 32px;
      font-size: 1.15rem;
      font-weight: 600;
      color: white;
      background: var(--primary);
      border: none;
      border-radius: 999px;
      text-decoration: none;
      box-shadow: 0 6px 20px rgba(107, 72, 255, 0.25);
      transition: all 0.25s ease;
      line-height: 1;
    }
    .order-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(107, 72, 255, 0.35);
      background: #5a3aff;
    }
    .bg-shapes { position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index: -1; }
    .shape { position: absolute; border-radius: 50%; opacity: 0.12; }
    .shape1 { width: 320px; height: 320px; background: var(--teal); top: -80px; left: -120px; }
    .shape2 { width: 480px; height: 480px; background: var(--coral); bottom: -160px; right: -180px; transform: rotate(45deg); }
    .shape3 { width: 220px; height: 220px; background: var(--mustard); top: 40%; left: 15%; }
    .shape4 { width: 180px; height: 180px; background: var(--mint); bottom: 20%; right: 10%; }
    .input-area { text-align: center; margin: 1rem 0 3rem; }
    input {
      font-size: 1.6rem;
      padding: 1.1rem 2rem;
      width: 100%;
      max-width: 620px;
      border: none;
      border-radius: 999px;
      background: white;
      box-shadow: 0 8px 30px rgba(107,72,255,0.12);
      text-align: center;
      font-weight: 500;
      transition: all 0.25s ease;
    }
    input:focus {
      outline: none;
      box-shadow: 0 12px 40px rgba(107,72,255,0.22);
      transform: translateY(-2px);
    }
    .char-count {
      font-size: 0.95rem;
      color: var(--gray);
      margin-top: 0.6rem;
      text-align: center;
    }
    .char-count.warning { color: #e53e3e; font-weight: 500; }
    .previews {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2.5rem;
    }
    .card {
      background: white;
      border-radius: 1.6rem;
      padding: 2.5rem 1.5rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
      transition: all 0.3s ease;
      text-align: center;
    }
    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 50px rgba(107,72,255,0.18);
    }
    .engraved {
      font-size: 2.4rem;
      letter-spacing: 1px;
      color: #000000;
      text-align: center;
      white-space: normal;
      word-break: break-word;
      line-height: 1.3;
      padding: 1.5rem 1rem;
      min-height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
      max-width: 100%;
    }
    .font-name {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--primary);
      margin-top: 1rem;
    }
    footer {
      text-align: center;
      margin-top: 5rem;
      color: var(--gray);
      font-size: 0.95rem;
    }
    @media (max-width: 640px) {
      .engraved { font-size: 2rem; }
      input { font-size: 1.4rem; padding: 1rem 1.5rem; }
      .order-btn { padding: 0 24px; font-size: 1rem; height: 44px; }
      .avito-icon { width: 44px; height: 44px; }
      .avito-icon-wrapper { width: 44px; height: 44px; }
    }
  </style>
</head>
<body>
  <div class="bg-shapes">
    <div class="shape shape1"></div>
    <div class="shape shape2"></div>
    <div class="shape shape3"></div>
    <div class="shape shape4"></div>
  </div>

  <div class="container">
    <header>
      <h1>Предпросмотр гравировки</h1>
      <p>Введите текст — и сразу посмотрите, как будет выглядеть надпись разными шрифтами</p>
      <div class="header-action">
        <div class="avito-icon-wrapper">
          <img src="avito.svg" alt="Авито" class="avito-icon">
        </div>
        <a href="https://www.avito.ru/brands/50e25f9bda2c5d592335a36162dd761b"
           target="_blank"
           rel="noopener noreferrer"
           class="order-btn">
          Заказать гравировку
        </a>
      </div>
    </header>

    <div class="input-area">
      <input
        type="text"
        id="engraveText"
        value="Александр Сергеевич"
        placeholder="Текст для гравировки..."
        maxlength="35"
      />
      <div class="char-count" id="charCount">0 / 35</div>
    </div>

    <div class="previews" id="previews"></div>

    <footer>Альберт • Авито • Гравировка • 2026</footer>
  </div>

  <script>
    const input = document.getElementById('engraveText');
    const charCount = document.getElementById('charCount');
    const container = document.getElementById('previews');

    let fonts = [];

    fetch('fonts-list.json')
      .then(response => {
        if (!response.ok) throw new Error('Не удалось загрузить fonts-list.json');
        return response.json();
      })
      .then(data => {
        fonts = data;
        renderPreviews(input.value);
      })
      .catch(err => {
        console.error(err);
        container.innerHTML = '<p style="color:red; text-align:center; grid-column:1/-1;">Ошибка загрузки списка шрифтов. Проверьте файл fonts-list.json</p>';
      });

    function renderPreviews(text) {
      const displayText = text.trim() || 'Александр Сергеевич';
      container.innerHTML = '';
      fonts.forEach(font => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="engraved" style="font-family: ${font.family} !important;">
            ${displayText}
          </div>
          <div class="font-name">${font.name}</div>
        `;
        container.appendChild(card);
      });
    }

    function updateCharCount() {
      const length = input.value.length;
      charCount.textContent = `${length} / 35`;
      charCount.classList.toggle('warning', length > 30);
    }

    input.addEventListener('input', () => {
      updateCharCount();
      renderPreviews(input.value);
    });

    updateCharCount();
  </script>
</body>
</html>
